paths:
  data_dir: data
  raw_dir: ${paths.data_dir}/raw
  processed_dir: ${paths.data_dir}/processed
  checkpoints_dir: checkpoints
  regions_dir: ${paths.processed_dir}/regions

document:
  dpi: 200
  layout_model: "DILHTWD/documentlayoutsegmentation_YOLOv8_ondoclaynet"
  layout_conf_threshold: 0.25
  region_padding: 5

retriever:
  model_name: "google/siglip-base-patch16-224"
  embedding_dim: 768
  image_size: 224

vectordb:
  host: "localhost"
  port: 6333
  collection_name: "document_regions"

training:
  batch_size: 64
  learning_rate: 1.0e-5
  num_epochs: 10
  warmup_ratio: 0.1
  num_hard_negatives: 7
  projection_dim: 256
  freeze_layers: 8
  gradient_accumulation_steps: 2
  fp16: true
  gradient_checkpointing: true
  eval_steps: 500
  save_steps: 1000
  seed: 42

generator:
  model: "gemini-2.0-flash"
  max_tokens: 1024
  temperature: 0.2

eval:
  top_k: [1, 5, 10]
  num_val_samples: 500
